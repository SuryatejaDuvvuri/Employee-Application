
<!DOCTYPE html>
<html>
<head>
<title> Employement Application</title>
<style>
body {
background-color:#87CEEB;


}

h1{

color:#FFF5EE;

}

label {

color:#FFFF66;

}

</style>

</head>
<body>

<h1 style="text-align:center">Employee Application Form</h1>
<hr>
<label for ="fname">First Name:</label>
<input type ="text"  id="fname" name="fname" value=""><br><br>
<label for ="lname">Last Name:</label>
<input type ="text" id="lname"  value=""><br><br>

<label for="birthday">Enter your DOB:</label>
<input type="date" id="birthday" name="birthday"><br><br>

<label for="phone">Telephone Number:</label>
<input type="tel" id="phone" name="phone" placeholder="408-671-8234"pattern="[0-9]{3}-[0-9] {2}-[0-9] {3}" required><br><br>

<label for ="position">Applying for Position:</label>
<input type ="text" id="Position"  value=""><br><br>

<label for ="date">When can you start?</label>
<input type ="text" id="date"  value=""><br><br>

<label for="address">Enter your address:</label>
<input type="text" id="address" name="address"><br><br>

<label for="email">Enter your email address:</label>
<input type="email" id="email" name="email"><br><br>

<fieldset>
<legend>Technical Languages  known</legend>
<input type="checkbox" id="Technical Language1" name="Technical Language1"  value="C programming">
<label for="Technical Language1">C programming</label><br>
<input type="checkbox" id="Technical Language2" name="Technical Language2"  value="Java">
<label for="Technical Language2">Java</label><br>
<input type="checkbox" id="Technical Language3" name="Technical Language3"  value="HTML">
<label for="Technical Language3">HTML</label><br>
<input type="checkbox" id="Technical Language4" name="Technical Language4"  value="CSS">
<label for="Technical Language4">CSS</label><br>
<input type="checkbox" id="Technical Language5" name="Technical Language5"  value="JavaScript">
<label for="Technical Language5">JavaScript</label>

</fieldset>

<label for="letter">Cover Letter</label><br>
<textarea id="letter" name="letter"></textarea><br>

<label for="myfile">Submit your Resume</label>
<input type="file" id="myfile" name="myfile">

</body>
</html>
